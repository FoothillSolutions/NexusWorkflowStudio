services:
  # Bun service (default — runs with: docker compose up --build)
  nextjs-standalone-with-bun:
    build:
      context: .
      dockerfile: Dockerfile.bun
    image: nextjs-standalone-bun-image
    container_name: nextjs-standalone-bun-container
    environment:
      NODE_ENV: production
      PORT: "3000"
    restart: unless-stopped

  # Node.js service (use with: docker compose --profile node up nextjs-standalone --build)
  nextjs-standalone:
    build:
      context: .
      dockerfile: Dockerfile
    image: nextjs-standalone-image
    container_name: nextjs-standalone-container
    environment:
      NODE_ENV: production
      PORT: "3000"
    restart: unless-stopped
    profiles:
      - node
