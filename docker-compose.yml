services:
  # Single service — Next.js HTTP and Hocuspocus WebSocket run in one process
  # on port 3000. See server.ts. Collab traffic rides over the same origin
  # at `/collab`, so any reverse proxy / CDN / LB that already forwards
  # HTTP+WS to 3000 carries it automatically.
  nexus-workflow-studio:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GIT_SHA: ${GIT_SHA:-unknown}
        BUILD_TIMESTAMP: ${BUILD_TIMESTAMP:-unknown}
    pull_policy: build
    image: nexus-workflow-studio:latest
    container_name: nexus-workflow-studio
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      NEXUS_BRAIN_DATA_DIR: /data/brain
      NEXUS_COLLAB_DATA_DIR: /data/collab
      NEXUS_LIBRARY_DATA_DIR: /data/library
      # Do NOT set NEXT_PUBLIC_COLLAB_SERVER_URL — leave unset so the browser
      # auto-resolves to same-origin `wss://<host>/collab`. Setting it bakes
      # a fixed URL into the JS bundle at build time.
      # ── Authentication (uncomment to enable OIDC/OAuth2 SSO) ──
      # AUTH_ISSUER: https://login.microsoftonline.com/your-tenant-id/v2.0
      # AUTH_CLIENT_ID: your-client-id
      # AUTH_CLIENT_SECRET: your-client-secret
      # AUTH_SECRET: generate-with-openssl-rand-base64-33
      # AUTH_PROVIDER_NAME: Microsoft
    expose:
      - "3000"
    volumes:
      - nexus_brain_data:/data/brain
      - nexus_library_data:/data/library
      - nexus_collab_data:/data/collab
    restart: unless-stopped

volumes:
  nexus_brain_data:
  nexus_collab_data:
  nexus_library_data:
