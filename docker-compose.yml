services:
  # Bun service (default — runs with: docker compose up --build)
  nexus-workflow-studio:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GIT_SHA: ${GIT_SHA:-unknown}
        BUILD_TIMESTAMP: ${BUILD_TIMESTAMP:-unknown}
    pull_policy: build
    image: nexus-workflow-studio:latest
    container_name: nexus-workflow-studio
    environment:
      NODE_ENV: production
      PORT: "3000"
      NEXUS_BRAIN_DATA_DIR: /data/brain
      NEXT_PUBLIC_COLLAB_SERVER_URL: ws://localhost:1234
      NEXT_PUBLIC_SPACETIME_URI: ws://localhost:${SPACETIME_PORT:-30201}
      NEXT_PUBLIC_SPACETIME_DB_NAME: nexus
    expose:
      - "3000"
    volumes:
      - nexus_brain_data:/data/brain
    restart: unless-stopped
  nexus-collab:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GIT_SHA: ${GIT_SHA:-unknown}
        BUILD_TIMESTAMP: ${BUILD_TIMESTAMP:-unknown}
    pull_policy: build
    image: nexus-workflow-studio:latest
    container_name: nexus-workflow-studio-collab
    command: ["bun", "scripts/collab-server.ts"]
    environment:
      NODE_ENV: production
      NEXUS_COLLAB_SERVER_PORT: "1234"
      NEXUS_COLLAB_DATA_DIR: /data/collab
    ports:
      - "1234:1234"
    volumes:
      - nexus_collab_data:/data/collab
    restart: unless-stopped

  # SpacetimeDB server (workspace persistence + real-time sync)
  nexus-spacetimedb:
    image: clockworklabs/spacetime:latest
    container_name: nexus-spacetimedb
    command: ["start"]
    environment:
      STDB_LOG_LEVEL: info
    ports:
      - "127.0.0.1:${SPACETIME_PORT:-30201}:3000"
    volumes:
      - nexus_spacetime_data:/var/lib/spacetimedb
    restart: unless-stopped

volumes:
  nexus_brain_data:
  nexus_collab_data:
  nexus_spacetime_data:
